vars:
  time_limit: &time_limit 360 # 1 hour (3600 seconds)
  step_count: &step_count 500

defaults: &defaults
  start: mlmaster/start.sh
  dockerfile: mlmaster/Dockerfile
  kwargs_type: omegaconf
  env_vars: &env_vars
    TIME_LIMIT_SECS: *time_limit
    STEP_LIMIT: *step_count

kwargs_common: &kwargs_common
  agent.code.model: gpt-5-mini
  agent.code.temp: 1.0
  agent.code.base_url: "https://api.openai.com/v1"
  agent.code.api_key: ${OPENAI_API_KEY}
  agent.feedback.model: gpt-5-mini
  agent.feedback.temp: 1.0
  agent.feedback.base_url: "https://api.openai.com/v1"
  agent.feedback.api_key: ${OPENAI_API_KEY}
  agent.steps: *step_count
  agent.steerable_reasoning: false  # Set to false for OpenAI models
  agent.check_format: true 
  start_cpu: 0  # Still in kwargs for Python, but also in env_vars for bash script
  cpus_per_task: 22  # CPUs per run (used by start.sh taskset)

mlmaster:
  <<: *defaults
  kwargs:
    <<: *kwargs_common
  env_vars:
    <<: *env_vars
    OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

mlmaster/deepseek-r1:
  <<: *defaults
  kwargs:
    <<: *kwargs_common
  env_vars:
    <<: *env_vars
    OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

mlmaster/gpt-5:
  <<: *defaults
  kwargs:
    <<: *kwargs_common
    agent.code.model: gpt-5
    agent.code.base_url: "https://api.openai.com/v1"
    agent.code.api_key: ${OPENAI_API_KEY}
    agent.steerable_reasoning: false  # Required for closed-source models
  env_vars:
    <<: *env_vars
    OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
