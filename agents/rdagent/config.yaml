vars:
  step_count: &step_count 50 # Increased from 10 to allow more iterations
  time_limit: &time_limit 7200 # 2 hours - optimized for faster execution

defaults: &defaults
  start: rdagent/start.sh
  dockerfile: rdagent/Dockerfile
  kwargs_type: null  # RD-Agent uses environment variables, not CLI kwargs
  env_vars: &env_vars
    TIME_LIMIT_SECS: *time_limit
    STEP_LIMIT: *step_count
    RDAGENT_FORCE_LOCAL_ENV: "1"
    # CPU allocation (used by rdagent/start.sh taskset)
    start_cpu: 0
    cpus_per_task: 22

rdagent:
  <<: *defaults
  kwargs: {}
  env_vars:
    <<: *env_vars
    OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    # RD-Agent specific environment variables
    CHAT_MODEL: gpt-5-mini
    CHAT_TEMPERATURE: "1"
    EMBEDDING_MODEL: text-embedding-3-small
    LITELLM_DROP_PARAMS: "True"
    # Data science scenario settings
    DS_LOCAL_DATA_PATH: /home/data
    DS_CODER_ON_WHOLE_PIPELINE: "True"
    DS_IF_USING_MLE_DATA: "True"
    DS_SAMPLE_DATA_BY_LLM: "False"  # Use sample for evaluation, but we patch final submission to use full data
    DS_SCEN: rdagent.scenarios.data_science.scen.DataScienceScen
    DS_USE_RAW_DESCRIPTION: "True"
    # Enforce explicit hyperparameter optimization (AIDE-like hard gate)
    DS_FORCE_HYPERPARAMETER_OPTIMIZATION: "False"
    # Disable Docker requirement for MLE-bench compatibility
    DS_Coder_CoSTEER_env_type: "conda"
    # Limit loops to finish in 12 minutes (each iteration ~3-4 min, so max 3 iterations)
    DS_CODER_MAX_LOOP: "3"
    DS_RUNNER_MAX_LOOP: "1"
    # Reduce timeouts to speed up execution (5 min debug, 10 min full)
    DS_DEBUG_TIMEOUT: "300"
    DS_FULL_TIMEOUT: "600"
    DS_DEBUG_RECOMMEND_TIMEOUT: "300"
    DS_FULL_RECOMMEND_TIMEOUT: "600"

rdagent/dev:
  <<: *defaults
  kwargs: {}
  env_vars:
    <<: *env_vars
    OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    CHAT_MODEL: gpt-5-mini
    CHAT_TEMPERATURE: "1"
    EMBEDDING_MODEL: text-embedding-3-small
    LITELLM_DROP_PARAMS: "True"
    DS_LOCAL_DATA_PATH: /home/data
    DS_CODER_ON_WHOLE_PIPELINE: "True"
    DS_IF_USING_MLE_DATA: "True"
    DS_SAMPLE_DATA_BY_LLM: "False"
    DS_SCEN: rdagent.scenarios.data_science.scen.DataScienceScen
    DS_USE_RAW_DESCRIPTION: "True"
    DS_FORCE_HYPERPARAMETER_OPTIMIZATION: "True"
    # Disable Docker requirement for MLE-bench compatibility
    DS_Coder_CoSTEER_env_type: "conda"

# A lighter preset that prioritizes speed and fewer tokens.
# Use this target when you want faster turnaround at the expense of peak score.
rdagent/light:
  <<: *defaults
  kwargs: {}
  env_vars:
    <<: *env_vars
    # Shorter runs by default
    TIME_LIMIT_SECS: 900
    STEP_LIMIT: 10

    # Ensure local (conda) env without docker probing
    RDAGENT_FORCE_LOCAL_ENV: "1"
    DS_Coder_CoSTEER_env_type: "conda"

    # Cheaper/faster LLMs
    OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    CHAT_MODEL: gpt-5-mini
    CHAT_TEMPERATURE: "1"
    EMBEDDING_MODEL: text-embedding-3-small
    LITELLM_DROP_PARAMS: "True"

    # Data science scenario: do less work per loop
    DS_LOCAL_DATA_PATH: /home/data
    DS_CODER_ON_WHOLE_PIPELINE: "False"
    DS_SAMPLE_DATA_BY_LLM: "False"
    DS_USE_RAW_DESCRIPTION: "False"
    DS_CODER_MAX_LOOP: "3"
    DS_RUNNER_MAX_LOOP: "1"
    DS_ENABLE_LOG_ARCHIVE: "False"
    DS_SCEN: rdagent.scenarios.data_science.scen.DataScienceScen
    # Faster I/O and logs
    LITELLM_CHAT_STREAM: "False"
    LITELLM_LOG_LLM_CHAT_CONTENT: "False"

# A medium preset for a more thorough check (≈30 min).
rdagent/medium:
  <<: *defaults
  kwargs: {}
  env_vars:
    <<: *env_vars
    TIME_LIMIT_SECS: 1800
    STEP_LIMIT: 20
    RDAGENT_FORCE_LOCAL_ENV: "1"
    DS_Coder_CoSTEER_env_type: "conda"
    OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    CHAT_MODEL: gpt-5-mini
    CHAT_TEMPERATURE: "1"
    EMBEDDING_MODEL: text-embedding-3-small
    LITELLM_DROP_PARAMS: "True"
    DS_LOCAL_DATA_PATH: /home/data
    DS_CODER_ON_WHOLE_PIPELINE: "False"
    DS_SAMPLE_DATA_BY_LLM: "False"
    DS_USE_RAW_DESCRIPTION: "False"
    DS_CODER_MAX_LOOP: "5"
    DS_RUNNER_MAX_LOOP: "2"
    DS_ENABLE_LOG_ARCHIVE: "False"
    DS_SCEN: rdagent.scenarios.data_science.scen.DataScienceScen
    LITELLM_CHAT_STREAM: "False"
    LITELLM_LOG_LLM_CHAT_CONTENT: "False"

# One-hour, 50-step preset (full pipeline)
rdagent/1h50:
  <<: *defaults
  kwargs: {}
  env_vars:
    <<: *env_vars
    TIME_LIMIT_SECS: 3600
    STEP_LIMIT: 50
    RDAGENT_FORCE_LOCAL_ENV: "1"
    DS_Coder_CoSTEER_env_type: "conda"
    OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    CHAT_MODEL: gpt-5-mini
    CHAT_TEMPERATURE: "1"
    EMBEDDING_MODEL: text-embedding-3-small
    LITELLM_DROP_PARAMS: "True"
    DS_LOCAL_DATA_PATH: /home/data
    DS_CODER_ON_WHOLE_PIPELINE: "True"
    DS_SAMPLE_DATA_BY_LLM: "False"
    DS_USE_RAW_DESCRIPTION: "True"
    DS_SCEN: rdagent.scenarios.data_science.scen.DataScienceScen
    LITELLM_CHAT_STREAM: "False"
    LITELLM_LOG_LLM_CHAT_CONTENT: "False"
